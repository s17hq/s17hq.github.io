<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntax17</title>
  <meta name="description" content="Building efficient, lightweight software for the modern web.">
  <meta property="og:title" content="Syntax17">
  <meta property="og:description" content="Building efficient, lightweight software for the modern web.">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Syntax17">
  <meta name="twitter:description" content="Building efficient, lightweight software for the modern web.">
  <link rel="icon" type="image/x-icon" href="https://s17labs.github.io/src/assets/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
  <style>
    :root {
      --bg: #0a0a0c;
      --surface: #111113;
      --accent: #ff4136;
      --text: #f0f0f0;
      --muted: #686868;
      --rule: rgba(255,255,255,0.07);
    }
    
    *, *::before, *::after { box-sizing: border-box; }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }
    body::-webkit-scrollbar { display: none; }
    
    a {
      color: inherit;
      text-decoration: none;
      transition: 0.2s;
    }
    a, button {
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }
    
    /* ---- LAYOUT ---- */
    .page {
      width: 100%;
      max-width: 680px;
      padding: 0 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    /* ---- HERO ---- */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 0 60px;
      animation: fadeUp 0.5s ease-out both;
    }
    
    .wordmark {
      font-family: 'Aldrich', sans-serif;
      font-size: clamp(2.55rem, 11.9vw, 4.67rem);
      line-height: 1;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.18em;
      margin-bottom: 28px;
    }
    
    .cube {
      display: inline-block;
      width: 0.72em;
      height: 0.72em;
      background: var(--accent);
      transform: translateY(-0.10em);
      flex-shrink: 0;
    }
    
    .wordmark-text .num {
      color: var(--accent);
    }
    
    .tagline {
      color: var(--muted);
      line-height: 1.6;
      max-width: 420px;
      margin-bottom: 48px;
    }
    
    /* ---- ACTIONS ---- */
    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      font-family: inherit;
      background: var(--surface);
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0.75rem 1.3rem;
      border-radius: 4px;
      transition: 0.25s ease;
    }
    
    .btn:hover {
      background: var(--accent);
      color: var(--text);
    }
    
    .btn-ghost {
      background: transparent;
      border-color: var(--rule);
    }
    
    .btn-ghost:hover {
      background: transparent;
      border-color: var(--accent);
      color: var(--accent);
    }
    
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }
    
    /* ---- FOOTER ---- */
    footer {
      width: 100%;
      max-width: 680px;
      padding: 16px 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
      gap: 16px;
      flex-wrap: wrap;
    }
    
    footer a:hover { color: var(--accent); }
    
    .social-links {
      display: flex;
      gap: 16px;
      align-items: center;
    }
    
    /* ---- ANIMATION ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    /* ---- MOBILE ---- */
    @media (max-width: 520px) {
      .actions { flex-direction: column; }
      .btn { justify-content: center; }
      footer { justify-content: center; text-align: center; }
    }
  </style>
</head>
<body>
  
  <div class="page">
    
    <div class="hero">
      <div class="wordmark">
        <div class="cube"></div>
        <div class="wordmark-text">Syntax<span class="num">17</span></div>
      </div>
      <p class="tagline">Building efficient, lightweight software for the modern web.</p>
      <div class="actions">
        <a href="https://github.com/s17hq" class="btn">
          <i class="fa-brands fa-github"></i> GitHub
        </a>
        <a href="https://s17labs.github.io" class="btn btn-ghost">
          <i class="fa-solid fa-flask-vial"></i> s17 Labs
        </a>
      </div>
    </div>
    
  </div>
  
  <footer>
    <span>© <script>document.write(new Date().getFullYear())</script> Syntax17</span>
    <div class="social-links">
      <a href="https://x.com/s17hq" target="_blank"><i class="fa-brands fa-x-twitter"></i> X (Twitter)</a>
      <a href="https://discord.gg/dDGbjKTVH2" target="_blank"><i class="fa-brands fa-discord"></i> Discord</a>
    </div>
  </footer>
  
</body>
</html>
