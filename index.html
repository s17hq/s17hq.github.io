<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Syntax17</title>

  <meta name="description" content="Building efficient, lightweight software for the modern web." />
  <meta property="og:title" content="Syntax17" />
  <meta property="og:description" content="Building efficient, lightweight software for the modern web." />
  <meta name="twitter:card" content="summary" />

  <link rel="icon" href="src/favicon.padding" />
  <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />

  <style>
    :root {
      --bg: #f1f1f1;
      --text: #0e0e10;
      --accent: #ff4136;
      --muted: #868686;
      --rule: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Verdana, sans-serif;
      font-size: 1rem;
    }

    a {
      color: inherit;
      text-decoration: none;
      transition: 0.2s ease;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      padding: 20px;
      animation: fadeUp 0.5s ease-out both;
    }

    header {
      text-align: center;
      margin: 2rem 0;
      font-family: 'Aldrich', sans-serif;
      font-size: clamp(2.5rem, 10vw, 4.5rem);
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.2em;
    }

    .cube {
      width: 0.75em;
      height: 0.75em;
      background: var(--accent);
      display: inline-block;
      transform: translateY(-0.1em);
    }

    .accent {
      color: var(--accent);
    }

    .card {
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .card p {
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.4rem;
      border-radius: 6px;
      font-size: 1rem;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .btn-primary {
      background: var(--text);
      color: var(--bg);
    }

    .btn-primary:hover {
      background: var(--accent);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--text);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    footer {
      width: 100%;
      max-width: 700px;
      padding: 16px 24px;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .social {
      display: flex;
      gap: 14px;
    }

    .social a:hover {
      color: var(--accent);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 580px) {
      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      footer {
        justify-content: center;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <main>
    <div class="card">

      <header>
        <div class="logo">
          <span class="cube"></span>
          Syntax<span class="accent">17</span>
        </div>
      </header>

      <p>Building efficient, lightweight software for the modern web.</p>

      <div class="buttons">
        <a class="btn btn-primary" href="https://github.com/s17hq" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-github"></i> GitHub
        </a>

        <a class="btn btn-outline" href="https://s17labs.github.io" target="_blank" rel="noopener noreferrer">
          <i class="fa-solid fa-flask"></i> s17 Labs
        </a>
      </div>

    </div>
  </main>

  <footer>
    <span>© <span id="year"></span> Syntax17</span>

    <div class="social">
      <a href="https://x.com/s17hq" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-x-twitter"></i> X
      </a>
      <a href="https://discord.gg/dDGbjKTVH2" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-discord"></i> Discord
      </a>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
